---
- name: Install and configure Zabbix Agent 2
  hosts: all
  become: true

  vars:
    zabbix_server: "192.168.18.203"
    zabbix_version: "7.0"

  tasks:
    - name: Check if zabbix-agent2 is already installed
      command: systemctl is-active zabbix-agent2
      register: agent_status
      ignore_errors: true
      changed_when: false

    - name: Set Ubuntu package version (22.04 for jammy, 24.04 for noble/oracular)
      set_fact:
        ubuntu_pkg_version: >-
          {{
            'ubuntu24.04' if ansible_distribution_release in ['noble', 'oracular']
            else 'ubuntu22.04'
          }}
      when: agent_status.rc != 0

    - name: Download Zabbix repository package
      get_url:
        url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+{{ ubuntu_pkg_version }}_all.deb"
        dest: /tmp/zabbix-release.deb
      when: agent_status.rc != 0
      register: download_result
      ignore_errors: true

    - name: Fail with helpful message if download failed (check DNS/internet on this host)
      fail:
        msg: "Failed to download Zabbix repo package from internet. Check if {{ inventory_hostname }} has DNS/internet access."
      when:
        - agent_status.rc != 0
        - download_result is failed

    - name: Install Zabbix repository
      apt:
        deb: /tmp/zabbix-release.deb
      when: agent_status.rc != 0

    - name: Update apt cache (only Zabbix repo for non-LTS Ubuntu like 24.10/oracular)
      command: >
        apt-get update
        -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/zabbix.list
        -o Dir::Etc::sourcelistd=''
      when:
        - agent_status.rc != 0
        - ansible_distribution_release in ['oracular']
      changed_when: true

    - name: Update apt cache (standard for LTS Ubuntu)
      apt:
        update_cache: true
      when:
        - agent_status.rc != 0
        - ansible_distribution_release not in ['oracular']
      ignore_errors: true

    - name: Install zabbix-agent2 (non-LTS Ubuntu — only Zabbix repo)
      command: >
        apt-get install -y zabbix-agent2
        -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/zabbix.list
        -o Dir::Etc::sourcelistd=''
      when:
        - agent_status.rc != 0
        - ansible_distribution_release in ['oracular']
      changed_when: true

    - name: Install zabbix-agent2 (standard)
      apt:
        name: zabbix-agent2
        state: present
      when:
        - agent_status.rc != 0
        - ansible_distribution_release not in ['oracular']

    - name: Configure Zabbix server address
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server }}"

    - name: Configure Zabbix server active address
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server }}"

    - name: Configure hostname
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Hostname='
        line: "Hostname={{ ansible_hostname_short | default(ansible_hostname) }}"

    - name: Enable and restart zabbix-agent2
      systemd:
        name: zabbix-agent2
        enabled: true
        state: restarted

    - name: Verify agent is running
      command: systemctl is-active zabbix-agent2
      register: final_status
      changed_when: false

    - name: Show agent status
      debug:
        msg: "zabbix-agent2 is {{ final_status.stdout }} on {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_release }})"
