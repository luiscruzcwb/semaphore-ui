---
# Uso: ansible-playbook bootstrap-ssh-key.yml -e "ssh_public_key='ssh-ed25519 AAAA... user@host'"
# Ou defina ssh_public_key em group_vars/all.yml (não commite o arquivo com a chave real).
- name: Instalar chave SSH manualmente
  hosts: all
  become: true
  tasks:
    - name: Garantir que diretório .ssh existe
      file:
        path: /home/ansible/.ssh
        state: directory
        owner: ansible
        group: ansible
        mode: '0700'

    - name: Adicionar chave pública
      ansible.posix.authorized_key:
        user: ansible
        state: present
        key: "{{ ssh_public_key | mandatory }}"
